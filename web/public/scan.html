<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PikTag - 有人想認識你</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background: #f5fefe;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 32px 24px;
    }

    .logo {
      font-size: 28px;
      font-weight: 800;
      color: #1a1a1a;
      margin-bottom: 48px;
      letter-spacing: -0.5px;
    }

    .logo span {
      color: #0fcdd6;
    }

    .card {
      width: 100%;
      max-width: 400px;
      text-align: center;
    }

    .avatar-placeholder {
      width: 80px;
      height: 80px;
      border-radius: 40px;
      background: linear-gradient(135deg, #0fcdd6 0%, #f8e537 100%);
      margin: 0 auto 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 36px;
    }

    h1 {
      font-size: 22px;
      font-weight: 700;
      color: #1a1a1a;
      margin-bottom: 12px;
      line-height: 1.4;
    }

    .subtitle {
      font-size: 15px;
      color: #666;
      line-height: 1.6;
      margin-bottom: 40px;
    }

    .open-btn {
      display: block;
      width: 100%;
      background: #0fcdd6;
      color: #fff;
      font-size: 17px;
      font-weight: 700;
      text-align: center;
      padding: 16px;
      border-radius: 14px;
      border: none;
      cursor: pointer;
      text-decoration: none;
      margin-bottom: 20px;
      transition: opacity 0.15s;
    }

    .open-btn:active {
      opacity: 0.8;
    }

    .download-link {
      font-size: 14px;
      color: #0fcdd6;
      text-decoration: none;
    }

    .download-link:hover {
      color: #0ab3bb;
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <div class="logo"># Pik<span>Tag</span></div>

  <div class="card">
    <div class="avatar-placeholder">👋</div>
    <h1 id="scan-name">PikTag 用戶 想在 PikTag 認識你</h1>
    <p class="subtitle">下載或開啟 PikTag，開始記住每個重要的人</p>
    <button class="open-btn" onclick="openInApp()">在 PikTag 中開啟</button>
    <a class="download-link" href="/download">還沒有 PikTag？點此下載</a>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const d = params.get('d') || '';
    let name = 'PikTag 用戶';
    try {
      const payload = JSON.parse(atob(d));
      name = payload.name || name;
    } catch(e) {}
    document.getElementById('scan-name').textContent = name + ' 想在 PikTag 認識你';

    function openInApp() {
      const appUrl = 'piktag://scan?d=' + encodeURIComponent(d);
      window.location = appUrl;
    }
  </script>
</body>
</html>
