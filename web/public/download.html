<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>下載 PikTag</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background-color: #fffdf5;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px 16px;
    }

    .container {
      width: 100%;
      max-width: 400px;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
    }

    .brand {
      font-size: 36px;
      font-weight: 800;
      color: #e8b931;
      letter-spacing: -0.5px;
      margin-bottom: 40px;
    }

    .headline {
      font-size: 22px;
      font-weight: 700;
      color: #1a1a1a;
      line-height: 1.35;
      margin-bottom: 12px;
    }

    .subheadline {
      font-size: 15px;
      color: #666;
      line-height: 1.5;
      margin-bottom: 40px;
    }

    .buttons {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      width: 100%;
      padding: 16px;
      border-radius: 14px;
      font-size: 16px;
      font-weight: 600;
      text-decoration: none;
      cursor: pointer;
      border: none;
      transition: opacity 0.15s ease;
    }

    .btn:active {
      opacity: 0.8;
    }

    .btn-appstore {
      background-color: #000;
      color: #fff;
    }

    .btn-googleplay {
      background-color: #fff;
      color: #1a1a1a;
      border: 1.5px solid #ddd;
    }

    .btn svg {
      flex-shrink: 0;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="brand"># PikTag</div>

    <h1 class="headline" id="headline">下載 PikTag，認識更多人</h1>
    <p class="subheadline">掃描 QR code、記住每個重要的人</p>

    <div class="buttons">
      <a href="#" class="btn btn-appstore">
        <!-- Apple logo SVG -->
        <svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor" xmlns="http://www.w3.org/2000/svg">
          <path d="M18.71 19.5c-.83 1.24-1.71 2.45-3.05 2.47-1.34.03-1.77-.79-3.29-.79-1.53 0-2 .77-3.27.82-1.31.05-2.3-1.32-3.14-2.53C4.25 17 2.94 12.45 4.7 9.39c.87-1.52 2.43-2.48 4.12-2.51 1.28-.02 2.5.87 3.29.87.78 0 2.26-1.07 3.8-.91.65.03 2.47.26 3.64 1.98-.09.06-2.17 1.28-2.15 3.81.03 3.02 2.65 4.03 2.68 4.04-.03.07-.42 1.44-1.38 2.83M13 3.5c.73-.83 1.94-1.46 2.94-1.5.13 1.17-.34 2.35-1.04 3.19-.69.85-1.83 1.51-2.95 1.42-.15-1.15.41-2.35 1.05-3.11z"/>
        </svg>
        App Store 下載
      </a>

      <a href="#" class="btn btn-googleplay">
        <!-- Google Play logo SVG -->
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M3.18 23.76c.3.16.65.2.99.1l11.37-11.37L12 9l-8.82 14.76z" fill="#EA4335"/>
          <path d="M20.54 10.27L17.46 8.5l-3.46 3.46 3.46 3.46 3.1-1.79a1.84 1.84 0 0 0 0-3.36z" fill="#FBBC04"/>
          <path d="M3.18.24A1.84 1.84 0 0 0 2 1.9v20.2c0 .7.4 1.3.99 1.62L14 12 3.18.24z" fill="#4285F4"/>
          <path d="M3.18 23.76L14 12 4.5.5 3.18.24C2.57.07 2 .53 2 1.17v21.66c0 .64.57 1.1 1.18.93z" fill="#34A853"/>
        </svg>
        Google Play 下載
      </a>
    </div>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const name = params.get('name') || '認識更多人';
    document.getElementById('headline').textContent = '下載 PikTag，追蹤 ' + decodeURIComponent(name);
  </script>
</body>
</html>
