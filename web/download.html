<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>下載 #piktag</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=Poppins:wght@700;800&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: linear-gradient(160deg, #faf5ff 0%, #fff5f5 50%, #f5f0ff 100%);
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px 16px;
    }
    .container {
      width: 100%;
      max-width: 400px;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
    }
    .brand {
      font-family: 'Poppins', sans-serif;
      font-size: 36px;
      font-weight: 800;
      color: #aa00ff;
      letter-spacing: -0.5px;
      margin-bottom: 40px;
    }
    .headline {
      font-size: 22px;
      font-weight: 700;
      color: #1a1a1a;
      line-height: 1.35;
      margin-bottom: 12px;
    }
    .subheadline {
      font-size: 15px;
      color: #666;
      line-height: 1.5;
      margin-bottom: 40px;
    }
    .buttons {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      width: 100%;
      padding: 16px;
      border-radius: 14px;
      font-size: 16px;
      font-weight: 600;
      text-decoration: none;
      cursor: pointer;
      border: none;
      transition: all 0.2s;
    }
    .btn:active { opacity: 0.8; }
    .btn-appstore { background-color: #000; color: #fff; }
    .btn-googleplay { background-color: #fff; color: #1a1a1a; border: 1.5px solid #ddd; }
    .btn-open {
      background: linear-gradient(90deg, #ff5757 0%, #8c52ff 100%);
      color: #fff;
      margin-top: 8px;
      box-shadow: 0 4px 16px rgba(170, 0, 255, 0.3);
    }
    .btn-open:hover { transform: translateY(-2px); box-shadow: 0 6px 24px rgba(170, 0, 255, 0.4); }
    .btn svg { flex-shrink: 0; }
    .open-section {
      display: none;
      width: 100%;
      margin-top: 24px;
      padding-top: 24px;
      border-top: 1px solid rgba(0,0,0,0.08);
    }
    .open-hint {
      font-size: 13px;
      color: #999;
      margin-bottom: 12px;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="brand">#piktag</div>
    <h1 class="headline" id="headline">下載 #piktag，認識更多人</h1>
    <p class="subheadline">掃描 QR code、記住每個重要的人</p>

    <div class="buttons">
      <a href="#" class="btn btn-appstore" id="btn-appstore">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor"><path d="M18.71 19.5c-.83 1.24-1.71 2.45-3.05 2.47-1.34.03-1.77-.79-3.29-.79-1.53 0-2 .77-3.27.82-1.31.05-2.3-1.32-3.14-2.53C4.25 17 2.94 12.45 4.7 9.39c.87-1.52 2.43-2.48 4.12-2.51 1.28-.02 2.5.87 3.29.87.78 0 2.26-1.07 3.8-.91.65.03 2.47.26 3.64 1.98-.09.06-2.17 1.28-2.15 3.81.03 3.02 2.65 4.03 2.68 4.04-.03.07-.42 1.44-1.38 2.83M13 3.5c.73-.83 1.94-1.46 2.94-1.5.13 1.17-.34 2.35-1.04 3.19-.69.85-1.83 1.51-2.95 1.42-.15-1.15.41-2.35 1.05-3.11z"/></svg>
        App Store 下載
      </a>
      <a href="#" class="btn btn-googleplay" id="btn-googleplay">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none"><path d="M3.18 23.76c.3.16.65.2.99.1l11.37-11.37L12 9l-8.82 14.76z" fill="#EA4335"/><path d="M20.54 10.27L17.46 8.5l-3.46 3.46 3.46 3.46 3.1-1.79a1.84 1.84 0 0 0 0-3.36z" fill="#FBBC04"/><path d="M3.18.24A1.84 1.84 0 0 0 2 1.9v20.2c0 .7.4 1.3.99 1.62L14 12 3.18.24z" fill="#4285F4"/><path d="M3.18 23.76L14 12 4.5.5 3.18.24C2.57.07 2 .53 2 1.17v21.66c0 .64.57 1.1 1.18.93z" fill="#34A853"/></svg>
        Google Play 下載
      </a>
    </div>

    <!-- Show "Open App" button when username/sid are present (user came from QR scan) -->
    <div class="open-section" id="open-section">
      <p class="open-hint">已經安裝了？直接打開 App 加好友</p>
      <button class="btn btn-open" id="btn-open" onclick="openApp()">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 3h6v6M10 14L21 3M18 13v6a2 2 0 01-2 2H5a2 2 0 01-2-2V8a2 2 0 012-2h6"/></svg>
        打開 #piktag App
      </button>
    </div>
  </div>

  <script>
    var params = new URLSearchParams(window.location.search);
    var name = params.get('name') || '';
    var username = params.get('username') || '';
    var sid = params.get('sid') || '';

    if (name) {
      document.getElementById('headline').textContent = '下載 #piktag，追蹤 ' + decodeURIComponent(name);
    }

    // Show "Open App" button if username is present (user came from a profile/QR)
    if (username) {
      document.getElementById('open-section').style.display = 'block';
    }

    function openApp() {
      var sidParam = sid ? '?sid=' + sid : '';
      var appUrl = 'piktag://' + username + sidParam;
      window.location = appUrl;
    }
  </script>
</body>
</html>
