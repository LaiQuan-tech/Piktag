<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>找不到頁面 | #piktag</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Poppins:wght@700;800&display=swap" rel="stylesheet">
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:'Inter',-apple-system,BlinkMacSystemFont,sans-serif;background:linear-gradient(160deg,#faf5ff 0%,#fff5f5 50%,#f5f0ff 100%);display:flex;align-items:center;justify-content:center;min-height:100vh;text-align:center;padding:20px}
    .container{max-width:400px}
    .logo{font-family:'Poppins',sans-serif;font-size:28px;font-weight:800;color:#8c52ff;margin-bottom:24px}
    .code{font-size:72px;font-weight:800;color:#e0c0ff;line-height:1;margin-bottom:8px}
    h1{font-size:20px;font-weight:700;color:#333;margin-bottom:8px}
    p{font-size:15px;color:#666;margin-bottom:28px;line-height:1.6}
    .btn{display:inline-block;background:linear-gradient(90deg,#ff5757,#8c52ff);color:#fff;font-weight:700;border-radius:24px;padding:12px 32px;font-size:15px;text-decoration:none;transition:all .2s;box-shadow:0 4px 16px rgba(170,0,255,.25)}
    .btn:hover{transform:translateY(-2px);box-shadow:0 6px 24px rgba(170,0,255,.35)}
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">#piktag</div>
    <div class="code">404</div>
    <h1>找不到這個頁面</h1>
    <p>你可能輸入了錯誤的網址，或這個頁面已經移除了</p>
    <a href="https://pikt.ag/download" class="btn">下載 #piktag App</a>
  </div>
</body>
</html>
