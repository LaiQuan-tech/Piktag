name: Android Google Play Build

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'mobile/**'
      - '.github/workflows/android-google-play.yml'

jobs:
  build-and-upload:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    env:
      EXPO_PUBLIC_SUPABASE_URL: ${{ secrets.EXPO_PUBLIC_SUPABASE_URL }}
      EXPO_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.EXPO_PUBLIC_SUPABASE_ANON_KEY }}
      EXPO_PUBLIC_GOOGLE_PLACES_API_KEY: ${{ secrets.EXPO_PUBLIC_GOOGLE_PLACES_API_KEY }}
      SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
      SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
      SENTRY_PROJECT: ${{ secrets.SENTRY_PROJECT }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: mobile/package-lock.json

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install dependencies
        working-directory: mobile
        run: npm ci

      - name: Set Android versionCode
        working-directory: mobile
        env:
          RUN_NUMBER: ${{ github.run_number }}
        run: |
          # Google Play rejects duplicate versionCodes. Use GitHub Actions
          # run_number (+1 offset so we never collide with pre-existing
          # build=1) as the Android versionCode. Matches the iOS buildNumber
          # strategy for consistency across platforms.
          VERSION_CODE=$((RUN_NUMBER + 1))
          node -e "
            const fs = require('fs');
            const app = JSON.parse(fs.readFileSync('app.json', 'utf8'));
            app.expo.android = app.expo.android || {};
            app.expo.android.versionCode = $VERSION_CODE;
            fs.writeFileSync('app.json', JSON.stringify(app, null, 2) + '\n');
          "
          echo "✅ Android versionCode set to $VERSION_CODE (run_number=$RUN_NUMBER)"

      - name: Generate native Android project
        working-directory: mobile
        run: npx expo prebuild --platform android --clean

      - name: Decode release keystore
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          echo "$ANDROID_KEYSTORE_BASE64" | base64 --decode > mobile/android/app/piktag-release.keystore

      - name: Build Android AAB
        working-directory: mobile/android
        env:
          SENTRY_DISABLE_AUTO_UPLOAD: ${{ secrets.SENTRY_AUTH_TOKEN == '' && 'true' || 'false' }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          # Allow Sentry upload to fail without blocking the build
          export SENTRY_ALLOW_FAILURE=true
          ./gradlew bundleRelease \
            -Pandroid.injected.signing.store.file=${{ github.workspace }}/mobile/android/app/piktag-release.keystore \
            -Pandroid.injected.signing.store.password="$ANDROID_KEYSTORE_PASSWORD" \
            -Pandroid.injected.signing.key.alias="$ANDROID_KEY_ALIAS" \
            -Pandroid.injected.signing.key.password="$ANDROID_KEY_PASSWORD" \
          || {
            echo "⚠️ Build failed, retrying with Sentry upload disabled..."
            export SENTRY_DISABLE_AUTO_UPLOAD=true
            ./gradlew bundleRelease \
              -Pandroid.injected.signing.store.file=${{ github.workspace }}/mobile/android/app/piktag-release.keystore \
              -Pandroid.injected.signing.store.password="$ANDROID_KEYSTORE_PASSWORD" \
              -Pandroid.injected.signing.key.alias="$ANDROID_KEY_ALIAS" \
              -Pandroid.injected.signing.key.password="$ANDROID_KEY_PASSWORD"
          }

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-aab
          path: mobile/android/app/build/outputs/bundle/release/*.aab

      - name: Upload to Google Play (Internal Track)
        if: github.ref == 'refs/heads/main'
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: ag.pikt.app
          releaseFiles: mobile/android/app/build/outputs/bundle/release/*.aab
          track: internal
          status: completed
