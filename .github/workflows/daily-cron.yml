name: Daily Cron Jobs

on:
  schedule:
    - cron: '0 1 * * *'   # 每天 UTC 01:00 (台灣 09:00) — 跟進提醒
    - cron: '0 19 * * *'  # 每天 UTC 19:00 (台灣 03:00) — 語意標籤歸類
  workflow_dispatch:       # 手動觸發

# CRON_SECRET must be set in:
# - GitHub Actions repo secrets
# - Supabase Edge Function secrets (supabase secrets set CRON_SECRET=<value>)

jobs:
  followup-check:
    runs-on: ubuntu-latest
    if: github.event.schedule == '0 1 * * *' || github.event_name == 'workflow_dispatch'
    steps:
      - name: Trigger daily-followup-check
        run: |
          curl --fail-with-body --silent --show-error -X POST \
            "https://kbwfdskulxnhjckdvghj.supabase.co/functions/v1/daily-followup-check" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            -H "Content-Type: application/json"

  # Birthday is the core of PikTag's CRM. Same 09:00 TW slot as
  # follow-up since both are "morning prompt" reminders the user is
  # most likely to act on right after they wake up.
  birthday-check:
    runs-on: ubuntu-latest
    if: github.event.schedule == '0 1 * * *' || github.event_name == 'workflow_dispatch'
    steps:
      - name: Trigger daily-birthday-check
        run: |
          curl --fail-with-body --silent --show-error -X POST \
            "https://kbwfdskulxnhjckdvghj.supabase.co/functions/v1/daily-birthday-check" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            -H "Content-Type: application/json"

  auto-link-concepts:
    runs-on: ubuntu-latest
    if: github.event.schedule == '0 19 * * *' || github.event_name == 'workflow_dispatch'
    steps:
      - name: Trigger auto-link-concepts
        run: |
          curl --fail-with-body --silent --show-error -X POST \
            "https://kbwfdskulxnhjckdvghj.supabase.co/functions/v1/auto-link-concepts" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            -H "Content-Type: application/json"
