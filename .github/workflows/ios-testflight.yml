name: iOS TestFlight Build

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'mobile/**'

jobs:
  build-and-upload:
    runs-on: macos-15
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: mobile/package-lock.json

      - name: Install dependencies
        working-directory: mobile
        run: npm ci

      - name: Generate native iOS project
        working-directory: mobile
        run: npx expo prebuild --platform ios --clean

      - name: Install CocoaPods
        working-directory: mobile/ios
        run: pod install

      - name: Write App Store Connect API Key
        env:
          ASC_API_KEY_P8: ${{ secrets.ASC_API_KEY_P8 }}
        run: |
          mkdir -p ~/private_keys
          echo "$ASC_API_KEY_P8" > ~/private_keys/AuthKey_${{ secrets.ASC_API_KEY_ID }}.p8

      - name: Find workspace name
        id: ws
        working-directory: mobile/ios
        run: |
          WS=$(ls -d *.xcworkspace | head -1)
          SCHEME="${WS%.xcworkspace}"
          echo "workspace=$WS" >> $GITHUB_OUTPUT
          echo "scheme=$SCHEME" >> $GITHUB_OUTPUT
          echo "Found workspace: $WS, scheme: $SCHEME"

      - name: Build iOS Archive
        working-directory: mobile/ios
        run: |
          set -o pipefail
          xcodebuild archive \
            -workspace "${{ steps.ws.outputs.workspace }}" \
            -scheme "${{ steps.ws.outputs.scheme }}" \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -archivePath $RUNNER_TEMP/mobile.xcarchive \
            -authenticationKeyPath ~/private_keys/AuthKey_${{ secrets.ASC_API_KEY_ID }}.p8 \
            -authenticationKeyID ${{ secrets.ASC_API_KEY_ID }} \
            -authenticationKeyIssuerID ${{ secrets.ASC_API_KEY_ISSUER_ID }} \
            -allowProvisioningUpdates \
            CODE_SIGN_STYLE=Automatic \
            DEVELOPMENT_TEAM=3NU6HAGX6Z \
            2>&1 | tee $RUNNER_TEMP/xcodebuild.log
          BUILD_EXIT=${PIPESTATUS[0]}
          if [ $BUILD_EXIT -ne 0 ]; then
            echo "::error::xcodebuild archive failed (exit $BUILD_EXIT)"
            echo ""
            echo "=== ERROR lines ==="
            grep -E " error: | error:$|^.*error:" $RUNNER_TEMP/xcodebuild.log | grep -v "^note:" | head -40 || true
            echo ""
            echo "=== Last 60 lines ==="
            tail -60 $RUNNER_TEMP/xcodebuild.log
            exit $BUILD_EXIT
          fi

      - name: Export and Upload to TestFlight
        run: |
          cat > $RUNNER_TEMP/ExportOptions.plist << 'PLIST'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store-connect</string>
            <key>destination</key>
            <string>upload</string>
            <key>teamID</key>
            <string>3NU6HAGX6Z</string>
          </dict>
          </plist>
          PLIST

          xcodebuild -exportArchive \
            -archivePath $RUNNER_TEMP/mobile.xcarchive \
            -exportOptionsPlist $RUNNER_TEMP/ExportOptions.plist \
            -exportPath $RUNNER_TEMP/export \
            -authenticationKeyPath ~/private_keys/AuthKey_${{ secrets.ASC_API_KEY_ID }}.p8 \
            -authenticationKeyID ${{ secrets.ASC_API_KEY_ID }} \
            -authenticationKeyIssuerID ${{ secrets.ASC_API_KEY_ISSUER_ID }} \
            -allowProvisioningUpdates

          echo "✅ Upload to App Store Connect / TestFlight completed successfully"
