name: iOS TestFlight Build

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'mobile/**'
      - '.github/workflows/ios-testflight.yml'

jobs:
  build-and-upload:
    runs-on: macos-15
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: mobile/package-lock.json

      - name: Install dependencies
        working-directory: mobile
        run: npm ci

      - name: Set iOS build number
        working-directory: mobile
        env:
          RUN_NUMBER: ${{ github.run_number }}
        run: |
          # Use GitHub Actions run_number as the iOS CFBundleVersion.
          # This guarantees every CI build gets a unique, monotonically
          # increasing build number — Apple TestFlight rejects duplicates.
          # Offset by +1 so we never collide with any pre-existing build=1.
          BUILD_NUMBER=$((RUN_NUMBER + 1))
          node -e "
            const fs = require('fs');
            const app = JSON.parse(fs.readFileSync('app.json', 'utf8'));
            app.expo.ios = app.expo.ios || {};
            app.expo.ios.buildNumber = String($BUILD_NUMBER);
            fs.writeFileSync('app.json', JSON.stringify(app, null, 2) + '\n');
          "
          echo "✅ iOS buildNumber set to $BUILD_NUMBER (run_number=$RUN_NUMBER)"

      - name: Generate native iOS project
        working-directory: mobile
        run: npx expo prebuild --platform ios --clean

      - name: Install CocoaPods
        working-directory: mobile/ios
        run: pod install

      - name: Import signing certificate
        env:
          DISTRIBUTION_CERT_P12_BASE64: ${{ secrets.DISTRIBUTION_CERT_P12_BASE64 }}
          DISTRIBUTION_CERT_PASSWORD: ${{ secrets.DISTRIBUTION_CERT_PASSWORD }}
        run: |
          CERT_PATH=$RUNNER_TEMP/certificate.p12
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          KEYCHAIN_PASSWORD=$(openssl rand -base64 32)

          # Decode certificate
          echo "$DISTRIBUTION_CERT_P12_BASE64" | base64 --decode > $CERT_PATH

          # Create temporary keychain
          security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH

          # Import certificate into keychain
          security import $CERT_PATH -P "$DISTRIBUTION_CERT_PASSWORD" \
            -A -t cert -f pkcs12 -k $KEYCHAIN_PATH
          security set-key-partition-list -S apple-tool:,apple: \
            -k "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH

          # Add to keychain search list (prepend so it's found first)
          security list-keychains -d user -s $KEYCHAIN_PATH $(security list-keychains -d user | tr -d '"')

          echo "✅ Signing certificate imported"

      - name: Write App Store Connect API Key
        env:
          ASC_API_KEY_P8: ${{ secrets.ASC_API_KEY_P8 }}
        run: |
          mkdir -p ~/private_keys
          echo "$ASC_API_KEY_P8" > ~/private_keys/AuthKey_${{ secrets.ASC_API_KEY_ID }}.p8

      - name: Find workspace name
        id: ws
        working-directory: mobile/ios
        run: |
          WS=$(ls -d *.xcworkspace | head -1)
          SCHEME="${WS%.xcworkspace}"
          echo "workspace=$WS" >> $GITHUB_OUTPUT
          echo "scheme=$SCHEME" >> $GITHUB_OUTPUT
          echo "Found workspace: $WS, scheme: $SCHEME"

      - name: Build iOS Archive
        working-directory: mobile/ios
        run: |
          set +e
          set -o pipefail
          xcodebuild archive \
            -workspace "${{ steps.ws.outputs.workspace }}" \
            -scheme "${{ steps.ws.outputs.scheme }}" \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -archivePath $RUNNER_TEMP/mobile.xcarchive \
            -authenticationKeyPath ~/private_keys/AuthKey_${{ secrets.ASC_API_KEY_ID }}.p8 \
            -authenticationKeyID ${{ secrets.ASC_API_KEY_ID }} \
            -authenticationKeyIssuerID ${{ secrets.ASC_API_KEY_ISSUER_ID }} \
            -allowProvisioningUpdates \
            CODE_SIGN_STYLE=Automatic \
            DEVELOPMENT_TEAM=3NU6HAGX6Z \
            2>&1 | tee $RUNNER_TEMP/xcodebuild.log
          BUILD_EXIT=$?
          if [ $BUILD_EXIT -ne 0 ]; then
            echo ""
            echo "========================================="
            echo "=== ACTUAL ERRORS (non-note lines)  ==="
            echo "========================================="
            grep -v "^note:" $RUNNER_TEMP/xcodebuild.log | grep -v "^$" | tail -80 || true
            echo "========================================="
            exit $BUILD_EXIT
          fi

      - name: Upload build log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: xcodebuild-log
          path: ${{ runner.temp }}/xcodebuild.log
          if-no-files-found: ignore

      - name: Export and Upload to TestFlight
        run: |
          cat > $RUNNER_TEMP/ExportOptions.plist << 'PLIST'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store-connect</string>
            <key>destination</key>
            <string>upload</string>
            <key>teamID</key>
            <string>3NU6HAGX6Z</string>
          </dict>
          </plist>
          PLIST

          xcodebuild -exportArchive \
            -archivePath $RUNNER_TEMP/mobile.xcarchive \
            -exportOptionsPlist $RUNNER_TEMP/ExportOptions.plist \
            -exportPath $RUNNER_TEMP/export \
            -authenticationKeyPath ~/private_keys/AuthKey_${{ secrets.ASC_API_KEY_ID }}.p8 \
            -authenticationKeyID ${{ secrets.ASC_API_KEY_ID }} \
            -authenticationKeyIssuerID ${{ secrets.ASC_API_KEY_ISSUER_ID }} \
            -allowProvisioningUpdates

          echo "✅ Upload to App Store Connect / TestFlight completed successfully"

      - name: Cleanup keychain
        if: always()
        run: |
          security delete-keychain $RUNNER_TEMP/app-signing.keychain-db 2>/dev/null || true
