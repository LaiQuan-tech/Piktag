name: iOS TestFlight Build

on:
  # push to main + concurrency de-dupe + daily backstop + manual.
  #
  # History: "build on every push" once blew Apple's per-app DAILY
  # upload cap (~10+ separate pushes in a few hours → 10+ uploads →
  # "Upload limit reached"). The fix attempted next — schedule-only,
  # NO push — backfired badly: GitHub's `schedule` is best-effort
  # and silently didn't fire for a whole day, so ~18 commits of
  # fixes never built and TestFlight went stale with NO fallback.
  #
  # Correct fix = keep push (reliable, immediate) BUT add a
  # `concurrency` group with cancel-in-progress: a rapid burst of N
  # commits cancels the in-flight builds and only the LATEST one
  # finishes → ~1 upload per burst, not N. That structurally solves
  # the original cap problem without losing reliable delivery. The
  # daily cron stays as a pure backstop (if nothing pushed in a day,
  # still ship the latest); workflow_dispatch for on-demand.
  push:
    branches: [main]
    paths:
      - 'mobile/**'
      - '!mobile/supabase/**'
      - '!mobile/scripts/**'
      - '.github/workflows/ios-testflight.yml'
  schedule:
    - cron: '30 20 * * *'   # daily UTC 20:30 (TW 04:30) — backstop only
  workflow_dispatch:          # on-demand manual run

# A burst of commits → cancel older in-flight builds, only the
# newest uploads. THIS is the real rate-limiter for the Apple cap
# (not a fragile schedule). queued/running builds for the same ref
# stream get superseded.
concurrency:
  group: ios-testflight
  cancel-in-progress: true

jobs:
  build-and-upload:
    # macos-15 is proven good: "Build iOS Archive" succeeds here and
    # the Xcode-26 gate passes (setup-xcode resolves Xcode 26 on this
    # image). The earlier "stuck at 574" was NOT a runner/Xcode issue
    # — it was Apple's per-app daily UPLOAD limit (~10+ builds/day
    # pushed; App Store Connect throttled: "Upload limit reached,
    # wait 1 day"). Keep the known-good runner.
    runs-on: macos-15
    timeout-minutes: 60

    # EXPO_PUBLIC_* vars are substituted into the JS bundle by Metro at
    # bundle time and read by supabase.ts / googlePlaces.ts / ManageTagsScreen
    # at runtime. They MUST be present in the environment of both `npx expo
    # prebuild` and the xcodebuild archive step (which invokes Metro via the
    # React Native "Bundle React Native code and images" Xcode script phase).
    # Setting them at job level is the simplest way to propagate to every step.
    #
    # Required GitHub Actions secrets (add in repo Settings → Secrets → Actions):
    #   - EXPO_PUBLIC_SUPABASE_URL
    #   - EXPO_PUBLIC_SUPABASE_ANON_KEY
    #   - EXPO_PUBLIC_GOOGLE_PLACES_API_KEY
    # (Gemini API key now lives ONLY as a Supabase Edge Function secret —
    #  it never ships to the client bundle.)
    env:
      EXPO_PUBLIC_SUPABASE_URL: ${{ secrets.EXPO_PUBLIC_SUPABASE_URL }}
      EXPO_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.EXPO_PUBLIC_SUPABASE_ANON_KEY }}
      EXPO_PUBLIC_GOOGLE_PLACES_API_KEY: ${{ secrets.EXPO_PUBLIC_GOOGLE_PLACES_API_KEY }}
      EXPO_PUBLIC_SENTRY_DSN: ${{ secrets.EXPO_PUBLIC_SENTRY_DSN }}
      SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
      SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
      SENTRY_PROJECT: ${{ secrets.SENTRY_PROJECT }}

    steps:
      # @v5 = Node 24 action runtime. GitHub force-migrates the
      # Node-20 runtime on 2026-06-02 and removes it 2026-09-16;
      # @v4 (Node 20) would break the pipeline after the cutover.
      # API-compatible bump — node-version below is the BUILD Node
      # (unrelated to the action's own runtime), left at 22.
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: mobile/package-lock.json

      # Apple ITMS-90725: starting 2026-04-28 every iOS submission must be
      # built with Xcode 26 / iOS 26 SDK. The macos-15 runner image ships
      # multiple Xcode versions side-by-side; pin the active one explicitly
      # so the build doesn't silently fall back to whatever xcode-select
      # points at by default.
      - name: Select Xcode 26
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Verify Xcode + SDK version
        run: |
          xcodebuild -version
          xcrun --sdk iphoneos --show-sdk-version
          # Hard fail if the runner doesn't actually have Xcode 26 — better
          # to abort now than upload another rejected build.
          XCODE_MAJOR=$(xcodebuild -version | head -1 | awk '{print $2}' | cut -d. -f1)
          if [ "$XCODE_MAJOR" -lt 26 ]; then
            echo "❌ Xcode $XCODE_MAJOR.x is below 26 — App Store will reject this build (ITMS-90725)"
            echo "   Fix: bump runs-on to a newer macOS runner image, or set xcode-version explicitly"
            exit 1
          fi

      - name: Install dependencies
        working-directory: mobile
        run: npm ci

      - name: Write .env from job env (belt & suspenders)
        working-directory: mobile
        run: |
          # Some Expo CLI tools read from mobile/.env in addition to
          # process.env. Write the file explicitly so both paths work,
          # regardless of whether Metro picks up from process.env or .env.
          cat > .env <<EOF
          EXPO_PUBLIC_SUPABASE_URL=${EXPO_PUBLIC_SUPABASE_URL}
          EXPO_PUBLIC_SUPABASE_ANON_KEY=${EXPO_PUBLIC_SUPABASE_ANON_KEY}
          EXPO_PUBLIC_GOOGLE_PLACES_API_KEY=${EXPO_PUBLIC_GOOGLE_PLACES_API_KEY}
          EXPO_PUBLIC_SENTRY_DSN=${EXPO_PUBLIC_SENTRY_DSN}
          EOF
          # Fail loudly if any required secret is missing. Better to abort
          # now than produce a crashing release build.
          if [ -z "$EXPO_PUBLIC_SUPABASE_URL" ] || [ -z "$EXPO_PUBLIC_SUPABASE_ANON_KEY" ]; then
            echo "❌ Missing EXPO_PUBLIC_SUPABASE_* secrets — add them in GitHub Settings → Secrets → Actions"
            exit 1
          fi
          if [ -z "$EXPO_PUBLIC_GOOGLE_PLACES_API_KEY" ]; then
            echo "❌ Missing EXPO_PUBLIC_GOOGLE_PLACES_API_KEY — add it in GitHub Settings → Secrets → Actions"
            exit 1
          fi
          echo "✅ mobile/.env written from secrets"

      - name: Set iOS build number
        working-directory: mobile
        env:
          RUN_NUMBER: ${{ github.run_number }}
        run: |
          # Use GitHub Actions run_number as the iOS CFBundleVersion.
          # This guarantees every CI build gets a unique, monotonically
          # increasing build number — Apple TestFlight rejects duplicates.
          # Offset by +1 so we never collide with any pre-existing build=1.
          BUILD_NUMBER=$((RUN_NUMBER + 1))
          node -e "
            const fs = require('fs');
            const app = JSON.parse(fs.readFileSync('app.json', 'utf8'));
            app.expo.ios = app.expo.ios || {};
            app.expo.ios.buildNumber = String($BUILD_NUMBER);
            fs.writeFileSync('app.json', JSON.stringify(app, null, 2) + '\n');
          "
          echo "✅ iOS buildNumber set to $BUILD_NUMBER (run_number=$RUN_NUMBER)"

      - name: Generate native iOS project
        working-directory: mobile
        run: npx expo prebuild --platform ios --clean

      - name: Configure Sentry (allow graceful failure)
        working-directory: mobile
        run: |
          # Create sentry.options.json so the Sentry Xcode build phase
          # doesn't exit 1 when the file is missing.
          cat > sentry.options.json << 'SJSON'
          {
            "dsn": "",
            "enableAutoSessionTracking": true
          }
          SJSON
          echo "✅ sentry.options.json created"

          # If SENTRY_AUTH_TOKEN is empty, disable Sentry upload in the
          # Xcode build phase by creating a .sentryclirc that skips it.
          if [ -z "$SENTRY_AUTH_TOKEN" ]; then
            echo "⚠️ SENTRY_AUTH_TOKEN is empty — Sentry upload will be skipped"
          fi

      - name: Install CocoaPods
        working-directory: mobile/ios
        run: pod install

      - name: Import signing certificate
        env:
          DISTRIBUTION_CERT_P12_BASE64: ${{ secrets.DISTRIBUTION_CERT_P12_BASE64 }}
          DISTRIBUTION_CERT_PASSWORD: ${{ secrets.DISTRIBUTION_CERT_PASSWORD }}
        run: |
          CERT_PATH=$RUNNER_TEMP/certificate.p12
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          KEYCHAIN_PASSWORD=$(openssl rand -base64 32)

          # Decode certificate
          echo "$DISTRIBUTION_CERT_P12_BASE64" | base64 --decode > $CERT_PATH

          # Create temporary keychain
          security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH

          # Import certificate into keychain
          security import $CERT_PATH -P "$DISTRIBUTION_CERT_PASSWORD" \
            -A -t cert -f pkcs12 -k $KEYCHAIN_PATH
          security set-key-partition-list -S apple-tool:,apple: \
            -k "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH

          # Add to keychain search list (prepend so it's found first)
          security list-keychains -d user -s $KEYCHAIN_PATH $(security list-keychains -d user | tr -d '"')

          echo "✅ Signing certificate imported"

      - name: Write App Store Connect API Key
        env:
          ASC_API_KEY_P8: ${{ secrets.ASC_API_KEY_P8 }}
        run: |
          mkdir -p ~/private_keys
          echo "$ASC_API_KEY_P8" > ~/private_keys/AuthKey_${{ secrets.ASC_API_KEY_ID }}.p8

      - name: Find workspace name
        id: ws
        working-directory: mobile/ios
        run: |
          WS=$(ls -d *.xcworkspace | head -1)
          SCHEME="${WS%.xcworkspace}"
          echo "workspace=$WS" >> $GITHUB_OUTPUT
          echo "scheme=$SCHEME" >> $GITHUB_OUTPUT
          echo "Found workspace: $WS, scheme: $SCHEME"

      - name: Build iOS Archive
        working-directory: mobile/ios
        env:
          SENTRY_DISABLE_AUTO_UPLOAD: ${{ secrets.SENTRY_AUTH_TOKEN == '' && 'true' || 'false' }}
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
          SENTRY_PROJECT: ${{ secrets.SENTRY_PROJECT }}
        run: |
          set +e
          set -o pipefail
          xcodebuild archive \
            -workspace "${{ steps.ws.outputs.workspace }}" \
            -scheme "${{ steps.ws.outputs.scheme }}" \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -archivePath $RUNNER_TEMP/mobile.xcarchive \
            -authenticationKeyPath ~/private_keys/AuthKey_${{ secrets.ASC_API_KEY_ID }}.p8 \
            -authenticationKeyID ${{ secrets.ASC_API_KEY_ID }} \
            -authenticationKeyIssuerID ${{ secrets.ASC_API_KEY_ISSUER_ID }} \
            -allowProvisioningUpdates \
            CODE_SIGN_STYLE=Automatic \
            DEVELOPMENT_TEAM=3NU6HAGX6Z \
            2>&1 | tee $RUNNER_TEMP/xcodebuild.log
          BUILD_EXIT=$?
          if [ $BUILD_EXIT -ne 0 ]; then
            echo ""
            echo "========================================="
            echo "=== ACTUAL ERRORS (non-note lines)  ==="
            echo "========================================="
            grep -v "^note:" $RUNNER_TEMP/xcodebuild.log | grep -v "^$" | tail -80 || true
            echo "========================================="
            exit $BUILD_EXIT
          fi

      - name: Upload build log on failure
        if: failure()
        uses: actions/upload-artifact@v5
        with:
          name: xcodebuild-log
          path: ${{ runner.temp }}/xcodebuild.log
          if-no-files-found: ignore

      - name: Export and Upload to TestFlight
        run: |
          cat > $RUNNER_TEMP/ExportOptions.plist << 'PLIST'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store-connect</string>
            <key>destination</key>
            <string>upload</string>
            <key>teamID</key>
            <string>3NU6HAGX6Z</string>
          </dict>
          </plist>
          PLIST

          xcodebuild -exportArchive \
            -archivePath $RUNNER_TEMP/mobile.xcarchive \
            -exportOptionsPlist $RUNNER_TEMP/ExportOptions.plist \
            -exportPath $RUNNER_TEMP/export \
            -authenticationKeyPath ~/private_keys/AuthKey_${{ secrets.ASC_API_KEY_ID }}.p8 \
            -authenticationKeyID ${{ secrets.ASC_API_KEY_ID }} \
            -authenticationKeyIssuerID ${{ secrets.ASC_API_KEY_ISSUER_ID }} \
            -allowProvisioningUpdates

          echo "✅ Upload to App Store Connect / TestFlight completed successfully"

      - name: Upload JS sourcemaps to Sentry
        # Belt-and-suspenders. The Sentry Xcode build phase already
        # uploads sourcemaps when SENTRY_AUTH_TOKEN is set, but it can
        # silently no-op (e.g. SENTRY_DISABLE_AUTO_UPLOAD=true). This
        # explicit step guarantees a sourcemap exists for every release
        # so production stack traces in Sentry stay symbolicated.
        if: ${{ env.SENTRY_AUTH_TOKEN != '' }}
        working-directory: mobile
        env:
          RUN_NUMBER: ${{ github.run_number }}
        run: |
          BUILD_NUMBER=$((RUN_NUMBER + 1))
          VERSION=$(node -e "console.log(require('./app.json').expo.version)")
          RELEASE="ag.pikt.app@${VERSION}+${BUILD_NUMBER}"
          mkdir -p dist
          npx expo export --platform ios --output-dir dist || echo "⚠️ expo export failed — sourcemap upload may be partial"
          npx @sentry/cli sourcemaps upload \
            --org "$SENTRY_ORG" \
            --project "$SENTRY_PROJECT" \
            --release "$RELEASE" \
            ./dist || echo "⚠️ sourcemap upload failed — non-fatal"

      - name: Cleanup keychain
        if: always()
        run: |
          security delete-keychain $RUNNER_TEMP/app-signing.keychain-db 2>/dev/null || true
