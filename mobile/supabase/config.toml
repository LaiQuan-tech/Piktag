# Supabase project config. Used by `supabase functions deploy` and similar
# CLI flows. Most settings are defaults; we only override per-function options.

project_id = "piktag"

# ---------------------------------------------------------------------------
# Edge Functions
# ---------------------------------------------------------------------------

[functions.send-chat-push]
# The DB trigger `trg_msg_push` calls this function over pg_net with the
# Supabase project's service-role key (in the new sb_secret_* format).
# Supabase's platform-level JWT verifier rejects sb_secret_* values with
# "Invalid JWT" because they are opaque, not JWTs. The function does its
# own auth check (compare against Deno.env.get('SUPABASE_SERVICE_ROLE_KEY'))
# so we disable the platform-level verification here.
verify_jwt = false

[functions.delete-user]
# Needs user JWT to self-delete, but also accepts service-role+admin_action
# branch. Keep JWT verification enabled; auth gate is inside the function.
verify_jwt = true

[functions.suggest-tags]
verify_jwt = true

[functions.notification-recommendation]
# pg_cron HTTP-POSTs this function with the service-role key as bearer
# (in sb_secret_* format), which the platform JWT verifier rejects. The
# function does its own auth check (CRON_SECRET or service_role_key)
# so we disable platform verification here. Same pattern as send-chat-push.
verify_jwt = false

[functions.notification-tag-trending]
verify_jwt = false

[functions.notification-birthday]
verify_jwt = false

[functions.notification-anniversary]
verify_jwt = false

# ---------------------------------------------------------------------------
# Daily cron functions invoked by GitHub Actions (.github/workflows/daily-cron.yml)
# over HTTPS with CRON_SECRET as the Bearer token. CRON_SECRET is opaque
# (not a JWT), so the platform-level verifier rejects it with 401
# INVALID_JWT_FORMAT before our function code runs. Each of these does its
# own constant-time CRON_SECRET check inside the request handler, so we
# disable platform verification here.
# ---------------------------------------------------------------------------

[functions.daily-birthday-check]
verify_jwt = false

[functions.daily-date-tag-anniversaries]
verify_jwt = false

[functions.auto-link-concepts]
verify_jwt = false
